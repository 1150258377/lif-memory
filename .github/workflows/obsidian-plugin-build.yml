name: Obsidian Plugin Build

on:
  pull_request:
    paths:
      - "obsidian-plugin/**"
      - ".github/workflows/obsidian-plugin-build.yml"
  push:
    paths:
      - "obsidian-plugin/**"
      - ".github/workflows/obsidian-plugin-build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: obsidian-plugin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build plugin
        run: npm run build

      - name: Verify release files
        run: |
          test -f manifest.json
          test -f main.js
          test -f styles.css
